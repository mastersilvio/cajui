services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cajui}
      POSTGRES_USER: ${POSTGRES_USER:-cajui}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cajui}
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cajui -d cajui"]
      interval: 5s
      timeout: 5s
      retries: 10

  scraper:
    build: ./services/scraper
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgres://cajui:cajui@postgres:5432/cajui
      SCRAPER_URL: http://scraper:8000
      API_PORT: 3300
    ports:
      - "3300:3300"
    depends_on:
      postgres:
        condition: service_healthy
      scraper:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: http://localhost:3300
    ports:
      - "55173:80"
    depends_on:
      - api

volumes:
  postgres_data:
